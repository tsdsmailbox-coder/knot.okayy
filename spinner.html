<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stop Doom Scrolling</title>

<link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Nunito:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#9CAF9A; /* full sage green */
font-family:'Nunito', sans-serif;
overflow:hidden;
}

/* removed blobs for clean sage background */

body::before{background:#1c4b36; top:-300px; left:-300px;}
body::after{background:#9b3f62; bottom:-300px; right:-300px;}

.container{
position:relative;
z-index:2;
width:90vw;
max-width:1100px;
height:85vh;
display:flex;
justify-content:space-between;
align-items:center;
padding:40px;
}

.title{
font-family:'Shrikhand', cursive;
font-size:52px;
color:#173a2b;
margin-bottom:25px;
}

.left{width:70%}

/* spinner */
.spinner-box{
height:80px;
overflow:hidden;
border-radius:40px;
background:#efe4d3;
position:relative;
border:3px solid #1c4b36;
box-shadow: inset 0 0 20px rgba(0,0,0,0.08);
}

.center-highlight{
position:absolute;
inset:0;
border-radius:40px;
box-shadow:0 0 0 3px #9b3f62 inset;
pointer-events:none;
}

.items{
transition:transform 2s cubic-bezier(.15,.85,.25,1);
}

.item{
height:80px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#2b3a33;
font-weight:600;
}

textarea{
width:100%;
margin-top:25px;
height:110px;
border-radius:20px;
border:2px solid #1c4b36;
padding:15px;
background:#f4ecdf;
font-size:15px;
}

/* lever area */
.lever-area{
width:140px;
display:flex;
justify-content:center;
align-items:center;
}

/* vertical slot lever */
.lever{
width:14px;
height:320px;
background:#1f3b2d;
border-radius:30px;
position:relative;
cursor:pointer;
box-shadow: inset 0 0 10px rgba(0,0,0,0.25);
}

.knob{
position:absolute;
top:0;
left:50%;
transform:translate(-50%,0);
width:42px;
height:42px;
border-radius:50%;
background:linear-gradient(145deg,#f29ac2,#8c5fd3);
box-shadow:0 10px 20px rgba(0,0,0,0.35);
transition: transform .2s ease;
}

@keyframes leverDown {
  0% { transform: translate(-50%, 0); }
  55% { transform: translate(-50%, 230px); }
  75% { transform: translate(-50%, 200px); }
  100% { transform: translate(-50%, 0); }
}
.knob.spin{
animation:leverDown .6s ease;
}

@media(max-width:768px){
.container{flex-direction:column;height:auto;gap:30px}
.left{width:100%}
.title{font-size:36px;text-align:center}
}
</style>
</head>

<body>

<div class="container">

<div class="left">
<div class="title">Stop Doom Scrolling :P </div>

<div class="spinner-box">
<div id="items" class="items"></div>
<div class="center-highlight"></div>
</div>

<textarea id="list">
Drink water
Crochet break
Walk
Read 2 pages
Clean something
Text a friend
Listen to music
Skincare time
Touch grass
Make coffee
Clean screenshots
Journal
Watch podcast
Read essay, article, poem
Watch "watch later" youtube
Draw
</textarea>
</div>

<div class="lever-area">
<div class="lever" onclick="spin()">
<div id="knob" class="knob"></div>
</div>
</div>

</div>

<script>
const itemsDiv = document.getElementById("items")

function load(){
const list = document.getElementById("list").value
.split("\n")
.filter(x=>x.trim())

itemsDiv.innerHTML = ""

Array(30).fill(list).flat().forEach(text=>{
const div = document.createElement("div")
div.className = "item"
div.innerText = text
itemsDiv.appendChild(div)
})
}

load()
document.getElementById("list").addEventListener("input",load)

let position = 0
let spinning = false

const audio = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0f1f.mp3?filename=correct-2-46134.mp3")

function spin(){
if(spinning) return
spinning=true

const knob = document.getElementById("knob")
knob.classList.remove("spin")
void knob.offsetWidth
knob.classList.add("spin")

const list = document.getElementById("list").value
.split("\n")
.filter(x=>x.trim())

const itemHeight = 80
const randomIndex = Math.floor(Math.random()*list.length)

position += (list.length * itemHeight * 4) + (randomIndex * itemHeight)

itemsDiv.style.transform = `translateY(-${position}px)`

setTimeout(()=>{
audio.currentTime=0
audio.play()
spinning=false
},2000)
}
</script>

</body>
</html>
